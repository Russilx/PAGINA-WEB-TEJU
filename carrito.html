<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Carrito</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<section class="carrito">

  <h1>Tu carrito 🛒</h1>

  <div id="carrito-container"></div>

  <div class="carrito-total">
    <h2 id="total"></h2>

    <a id="comprar" target="_blank">
      <button class="buy-btn">FINALIZAR COMPRA</button>
    </a>
  </div>

</section>

<script>
let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
let container = document.getElementById("carrito-container");
let total = 0;
let mensaje = "Hola quiero comprar:%0A";

function renderCarrito() {
  container.innerHTML = "";
  total = 0;
  mensaje = "Hola quiero comprar:%0A";

  if (carrito.length === 0) {
  container.innerHTML = "<p>El carrito está vacío 🛒</p>";
  document.getElementById("total").innerText = "Total: $0";
  document.getElementById("comprar").style.display = "none";
  return;
} else {
  document.getElementById("comprar").style.display = "block";
}

  carrito.forEach((p, index) => {

    container.innerHTML += `
      <div class="item">
        <img src="${p.imagen}">
        
        <div class="info">
          <h3>${p.nombre}</h3>
          <p>Talle: ${p.talle}</p>
          <p>Cantidad: ${p.cantidad}</p>
          <p>$${p.precio} x ${p.cantidad}</p>
          <p><strong>$${p.precio * p.cantidad}</strong></p>
        </div>

        <button onclick="eliminar(${index})">❌</button>
      </div>
    `;

    total += p.precio * p.cantidad;
    mensaje += `- ${p.nombre} (Talle ${p.talle}) x${p.cantidad} = $${p.precio * p.cantidad}%0A`;
  });

  document.getElementById("total").innerText = "Total: $" + total;

  mensaje += `%0ATotal: $${total}`;

  document.getElementById("comprar").href =
    "https://wa.me/541164535290?text=" + mensaje;
}

function eliminar(index) {
  carrito.splice(index, 1);
  localStorage.setItem("carrito", JSON.stringify(carrito));
  renderCarrito();
}

renderCarrito();
</script>

</body>
</html>
