<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vaquita</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body class="producto">

<header>
  <div class="logo-container">
    <img src="img/logo.jpg" class="logo">
    <span class="brand-name">Teju Shoes</span>
  </div>
</header>

<section class="product-page">

  <!-- IMÁGENES -->
  <div class="product-gallery">
    <img src="img/vaquita1.jpg">
    <img src="img/vaquita2.jpg">
    <img src="img/vaquita3.jpg">
  </div>

  <!-- INFO -->
  <div class="product-info-page">
    <h1 id="nombre-producto">VAQUITA</h1>
    <p class="price">$160650</p>

    <div class="sizes">
      <p>TALLE</p>
      <div class="options" id="talles">
        <span>35</span><span>36</span><span>37</span>
        <span>38</span><span>39</span><span>40</span>
      </div>
    </div>

    <div class="quantity">
      <button onclick="cambiarCantidad(-1)">-</button>
      <span id="cantidad">1</span>
      <button onclick="cambiarCantidad(1)">+</button>
    </div>

    <button class="buy-btn" onclick="agregarAlCarrito()">
      AGREGAR AL CARRITO
    </button>
  </div>

</section>

<section class="extra-info">

  <div class="description-box">
    <h2>DESCRIPCIÓN</h2>
    <p>Zueco de cuero hecho a mano, cómodo y resistente.</p>
  </div>

  <div class="tabla-contenedor">

    <div class="tabla-talles">
      <h3>TABLA DE TALLES</h3>
      <p>23,3cm - 35</p>
      <p>24cm - 36</p>
      <p>24,7cm - 37</p>
    </div>

    <div class="tabla-info">
      <h3>COMO MEDIR TU PIE?</h3>
      <p>Coloca una hoja contra la pared y medí tu pie.</p>
    </div>

  </div>

</section>

<script>
let talleSeleccionado = null;
let cantidad = 1;

document.querySelectorAll("#talles span").forEach(el => {
  el.addEventListener("click", () => {
    document.querySelectorAll("#talles span").forEach(s => s.classList.remove("active"));
    el.classList.add("active");
    talleSeleccionado = el.innerText;
  });
});

function cambiarCantidad(valor) {
  cantidad += valor;
  if (cantidad < 1) cantidad = 1;
  document.getElementById("cantidad").innerText = cantidad;
}

function agregarAlCarrito() {
  if (!talleSeleccionado) {
    alert("Seleccioná un talle");
    return;
  }

  const nombre = document.getElementById("nombre-producto").innerText;
  const precio = 160650;

  const producto = {
    nombre,
    precio,
    talle: talleSeleccionado,
    cantidad
  };

  let carrito = JSON.parse(localStorage.getItem("carrito")) || [];
  carrito.push(producto);
  localStorage.setItem("carrito", JSON.stringify(carrito));

  alert("Producto agregado 🛒");
}
</script>

</body>
</html>
